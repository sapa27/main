<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GAS Bridge Diagnostic</title>
  <style>
    body{font-family:Sarabun,Arial,sans-serif;margin:24px;line-height:1.5;background:#f8fafc;color:#0f172a}
    .card{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:18px;max-width:980px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    code,pre{background:#f1f5f9;border-radius:8px;padding:2px 6px} pre{padding:12px;white-space:pre-wrap;overflow:auto;min-height:240px}
    button{padding:10px 16px;border:0;border-radius:10px;background:#0f172a;color:white;cursor:pointer}
    .ok{color:#047857}.bad{color:#b91c1c}.muted{color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <h1>ตรวจสอบ GitHub Pages → GAS Bridge</h1>
    <p>หน้านี้ทดสอบ named-request iframe แบบส่งคำสั่งด้วย postMessage หลัง iframe โหลด ไม่ใช้ form POST และไม่ส่งรหัสผ่านผ่าน URL</p>
    <p><strong>GAS URL:</strong> <code id="gasUrl"></code></p>
    <p><strong>Transport:</strong> <code id="transportMode"></code></p>
    <p><button id="runBtn">เริ่มตรวจสอบ</button></p>
    <pre id="out">รอกดปุ่มตรวจสอบ...</pre>
  </div>
  <script src="./app-config.js?bridge=named-request"></script>
  <script src="./github-gas-transport.js?bridge=named-request"></script>
  <script>
    const $ = id => document.getElementById(id);
    const gasUrl = () => (window.APP_CONFIG && window.APP_CONFIG.gasWebAppUrl || '').trim();
    $('gasUrl').textContent = gasUrl() || '(ยังไม่ได้ตั้งค่า)';
    $('transportMode').textContent = (window.AppTransport && window.AppTransport.transportMode) || (window.APP_CONFIG && window.APP_CONFIG.transportMode) || '(unknown)';
    function write(line){ $('out').textContent += '\n' + line; }
    function jsonpPublicConfig(){
      return new Promise((resolve) => {
        const url = gasUrl();
        const cb = 'diag_public_' + Date.now() + '_' + Math.random().toString(36).slice(2).replace(/[^A-Za-z0-9_$]/g,'');
        const script = document.createElement('script');
        let done = false;
        const finish = v => { if (done) return; done = true; clearTimeout(timer); try { delete window[cb]; } catch(_) { window[cb] = undefined; } try { script.remove(); } catch(_) {} resolve(v || null); };
        const timer = setTimeout(() => finish(null), 10000);
        window[cb] = data => finish(data || null);
        script.onerror = () => finish(null);
        script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + '__githubPublicConfig=1&callback=' + encodeURIComponent(cb) + '&_=' + Date.now();
        document.head.appendChild(script);
      });
    }
    async function run(){
      $('out').textContent = 'เริ่มตรวจสอบ...';
      try {
        write('1) ตรวจรูปแบบ GAS URL');
        if (!gasUrl()) throw new Error('ยังไม่ได้ตั้งค่า gasWebAppUrl ใน app-config.js');
        if (!/\/exec(?:$|[?#])/.test(gasUrl())) write('   WARNING: URL ไม่ได้ลงท้ายด้วย /exec');
        write('   OK: ' + gasUrl());
        write('   transportMode: ' + ((window.AppTransport && window.AppTransport.transportMode) || '(unknown)'));

        write('2) ทดสอบ doGet public config ผ่าน JSONP');
        const cfg = await jsonpPublicConfig();
        write('   ' + JSON.stringify(cfg, null, 2));
        if (!cfg || !cfg.ok) write('   WARNING: public config ไม่ตอบ อาจเป็น URL/deploy/permission');

        write('3) ทดสอบ named-request bridge ping');
        write('   mode detail: parent จะส่ง payload เข้า iframe ด้วย postMessage ซ้ำหลัง iframe โหลด');
        const ping = await window.AppTransport.ping();
        write('   ' + JSON.stringify(ping, null, 2));
        write('   state: ' + JSON.stringify(window.AppTransport.bridgeClientState(), null, 2));
        if (!ping || !ping.ok) throw new Error('named-request bridge ping ไม่สำเร็จ');

        write('4) ทดสอบ apiGetRouteContract ผ่าน apiRouter');
        const contract = await window.AppTransport.run('apiGetRouteContract', {diagnostic:true});
        write('   ' + JSON.stringify(contract, null, 2).slice(0, 3000));
        write('\nผลลัพธ์: OK - GitHub ติดต่อ GAS ได้');
      } catch (e) {
        write('\nผลลัพธ์: ERROR');
        write(String(e && e.message || e));
        try { write('\nstate ล่าสุด: ' + JSON.stringify(window.AppTransport && window.AppTransport.bridgeClientState ? window.AppTransport.bridgeClientState() : {}, null, 2)); } catch(_) {}
        write('\nคำแปลผล: ถ้าข้อ 2 ไม่ตอบ = URL/deploy/permission ยังผิด; ถ้าข้อ 3 timeout = หน้า GAS bridge อาจยังไม่ใช่ไฟล์ล่าสุด หรือมี doGet ซ้ำ; ถ้าข้อ 3 ตอบแต่ login ไม่ผ่าน = ตรวจ apiLogin/ข้อมูลผู้ใช้ในชีต');
      }
    }
    document.getElementById('runBtn').addEventListener('click', run);
  </script>
</body>
</html>
