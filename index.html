<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบริหารจัดการเรื่องพิจารณา - สภาผู้แทนราษฎร</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
    .badge { font-size: 0.9em; font-weight: normal; }
  </style>
</head>
<body>
  
  <div id="app" class="container mt-4">
    <div class="row">
      <div class="col-12">
        <h2 class="mb-4"><i class="fas fa-gavel text-primary"></i> ระบบบริหารจัดการเรื่องพิจารณา</h2>
        
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white">
            <h5 class="mb-0">ติดตามสถานะเรื่องพิจารณา</h5>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover table-bordered" id="reportTable">
                <thead class="table-light">
                  <tr>
                    <th class="text-center" width="8%">ลำดับ</th>
                    <th width="35%">เรื่อง</th>
                    <th width="20%">ชื่อ-สกุล</th>
                    <th width="20%">ผู้ร่วมรับผิดชอบ</th>
                    <th class="text-center" width="17%">สถานะ</th>
                  </tr>
                </thead>
                <tbody id="reportTableBody">
                  <tr><td colspan="5" class="text-center text-muted">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white">
            <h5 class="mb-0">บันทึกข้อมูล/อัปเดตสถานะ</h5>
          </div>
          <div class="card-body">
            <form id="caseForm">
              <div class="row mb-3">
                <div class="col-md-12">
                  <label class="form-label">เรื่องพิจารณา</label>
                  <input type="text" id="caseTitle" class="form-control" required>
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">ชื่อ-สกุล (ผู้ร้อง/ผู้รับผิดชอบหลัก)</label>
                  <input type="text" id="petitionerName" class="form-control">
                </div>
                <div class="col-md-6">
                  <label class="form-label">ผู้ร่วมรับผิดชอบ</label>
                  <input type="text" id="coAssignee" class="form-control">
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label">สถานที่ (ตำบล)</label>
                  <input type="text" id="locSubdistrict" class="form-control" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">อำเภอ</label>
                  <input type="text" id="locDistrict" class="form-control" required>
                </div>
                <div class="col-md-4">
                  <label class="form-label">จังหวัด</label>
                  <input type="text" id="locProvince" class="form-control" required>
                </div>
              </div>
              <div class="row mb-4">
                <div class="col-md-6">
                  <label class="form-label">สถานะปัจจุบัน</label>
                  <select id="caseStatus" class="form-select">
                    <option value="กำลังพิจารณา">กำลังพิจารณา</option>
                    <option value="รายงานแล้ว">รายงานแล้ว</option>
                    <option value="คืนเงินแล้ว">คืนเงินแล้ว</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> บันทึกข้อมูล</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/reportTrack.js"></script>
  <script src="./assets/js/cases.js"></script>
</body>
</html>
